<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="dashboard">
    <h2>Company Map Dashboard</h2>

    <div id="topbar" class="panel">
      <label for="displayMode">Mode:</label>
      <select id="displayMode">
        <option value="cities" selected>Cities</option>
        <option value="companies">Companies</option>
        
      </select>

      <label for="industryFilter">Industry:</label>
      <select id="industryFilter"></select>

      <button type="button" onclick="resetMapZoom()">Reset Zoom</button>
    </div>

    <div id="content">
      <!-- LEFT: aggregates + basket chart -->
      <div class="panel" id="left-panel">
        <div class="panel-header">Selection Summary</div>
        <div class="panel-body">
          <div id="aggregate-container"></div>

          <!-- Basket chart boxed panel -->
          <div class="panel" id="basket-panel" style="margin-top:12px;">
            <div class="panel-header">Basket Chart</div>
            <div class="panel-body">
              <div id="aggregate-stock-chart-container">
                <p class="chart-placeholder">No basket data selected.</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- MAP -->
      <div class="panel" id="map-panel">
        <div class="panel-header">Map</div>
        <div class="panel-body">
          <svg id="map"></svg>
        </div>
      </div>

      <!-- RIGHT: widgets + single stock chart -->
      <div class="panel" id="right-panel">
        <div class="panel-header">Details</div>
        <div class="panel-body">
          <div id="widget-area-1"></div>

          <div class="panel" style="margin-top:12px;">
            <div class="panel-header">Stock Chart</div>
            <div class="panel-body">
              <div id="stock-chart-container">
                <p class="chart-placeholder">Select a company to view stock data.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="tooltip"></div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="script.js"></script>
</body>
</html>
